<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CronosMac</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{background:#1a1d27;border-bottom:1px solid #2d3148;padding:14px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:700;color:#7c83ff}
header span{color:#64748b;font-size:.85rem}
.layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 53px)}

/* sidebar */
.sidebar{background:#1a1d27;border-right:1px solid #2d3148;overflow-y:auto;padding:16px}
.sidebar h2{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:10px}
.source-card{background:#0f1117;border:1px solid #2d3148;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:8px}
.source-card.selected{border-color:#4f46e5;background:#1e1b4b}
.source-card .scheck{margin-top:2px;accent-color:#4f46e5;width:14px;height:14px;flex-shrink:0}
.source-card .sinfo{flex:1;min-width:0}
.source-card .sname{font-weight:600;font-size:.9rem;color:#a5b4fc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-card .smeta{font-size:.75rem;color:#64748b;margin-top:3px}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.7rem;font-weight:600;margin-right:4px}
.badge-cronos{background:#312e81;color:#a5b4fc}
.badge-csv{background:#14532d;color:#86efac}
.badge-sql{background:#7c2d12;color:#fdba74}

/* export section */
.export-box{margin-top:16px;padding-top:16px;border-top:1px solid #2d3148}
.export-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sel-count{font-size:.78rem;color:#a5b4fc}
.export-fields{display:none}
.export-fields.visible{display:block}

/* import section */
.import-box{margin-top:20px}
.import-box h2{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:10px}
.tabs{display:flex;gap:4px;margin-bottom:10px}
.tab{padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.8rem;border:1px solid #2d3148;color:#94a3b8;background:transparent}
.tab.active{background:#312e81;color:#a5b4fc;border-color:#4f46e5}
.tab-content{display:none}
.tab-content.active{display:block}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;font-weight:600}
.btn-primary{background:#4f46e5;color:#fff}
.btn-primary:hover{background:#4338ca}
.btn-sm{padding:4px 10px;font-size:.78rem}
input[type=file],input[type=text]{width:100%;padding:6px 8px;border-radius:6px;border:1px solid #2d3148;background:#0f1117;color:#e2e8f0;font-size:.82rem;margin-bottom:8px}
.status-msg{font-size:.8rem;color:#86efac;margin-top:6px;min-height:16px}

/* main area */
.main{display:flex;flex-direction:column;overflow:hidden}
.search-bar{padding:16px 20px;background:#1a1d27;border-bottom:1px solid #2d3148;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:9px 14px;border-radius:8px;border:1px solid #2d3148;background:#0f1117;color:#e2e8f0;font-size:.95rem}
.search-bar select{padding:8px 10px;border-radius:8px;border:1px solid #2d3148;background:#0f1117;color:#e2e8f0;font-size:.85rem}
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.results-pane{flex:1;overflow-y:auto;padding:16px 20px}

/* results */
.results-count{font-size:.82rem;color:#64748b;margin-bottom:12px}
.rec-card{background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:12px;margin-bottom:8px}
.rec-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.rec-source{font-size:.78rem;color:#a5b4fc;font-weight:600}
.rec-table{font-size:.78rem;color:#64748b}
.rec-fields{display:flex;flex-wrap:wrap;gap:6px}
.field{font-size:.78rem;background:#0f1117;border-radius:4px;padding:3px 8px}
.field .fkey{color:#64748b}
.field .fval{color:#e2e8f0;margin-left:4px;font-weight:500}
.field .fval.highlight{color:#fbbf24}
.empty-state{text-align:center;padding:60px 20px;color:#475569}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
</style>
</head>
<body>
<header>
  <h1>⬡ CronosMac</h1>
  <span>Поиск по базам данных</span>
</header>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 id="src-title">Источники (0)</h2>
    <div id="source-list"><div style="color:#475569;font-size:.82rem">Загрузка...</div></div>

    <!-- Multi-source export -->
    <div class="export-box">
      <div class="export-bar">
        <h2 style="margin:0">Экспорт в Cronos</h2>
        <span class="sel-count" id="sel-count">0 выбрано</span>
      </div>
      <div class="export-fields" id="export-fields">
        <input type="text" id="exp-dbname" placeholder="Название банка (напр. MyDB)">
        <input type="text" id="exp-outdir" placeholder="Папка вывода (полный путь)">
        <button class="btn btn-primary btn-sm" onclick="exportSelected()">Экспортировать выбранные</button>
        <div class="status-msg" id="exp-status"></div>
      </div>
    </div>

    <!-- Import -->
    <div class="import-box">
      <h2>Импорт</h2>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('csv',this)">CSV</div>
        <div class="tab" onclick="switchTab('sql',this)">SQL</div>
        <div class="tab" onclick="switchTab('cronos',this)">Cronos</div>
        <div class="tab" onclick="switchTab('batch',this)" title="Конвертировать несколько файлов в один Cronos-банк">Пакет</div>
      </div>

      <div id="tab-csv" class="tab-content active">
        <input type="file" id="csv-file" accept=".csv,.tsv,.txt">
        <button class="btn btn-primary btn-sm" onclick="uploadFile('csv')">Загрузить</button>
        <div class="status-msg" id="csv-status"></div>
      </div>

      <div id="tab-sql" class="tab-content">
        <input type="file" id="sql-file" accept=".sql,.gz">
        <button class="btn btn-primary btn-sm" onclick="uploadFile('sql')">Загрузить</button>
        <div class="status-msg" id="sql-status"></div>
      </div>

      <div id="tab-cronos" class="tab-content">
        <input type="text" id="cronos-path" placeholder="Путь к папке с CroBank/CroStru...">
        <input type="text" id="cronos-name" placeholder="Название базы">
        <button class="btn btn-primary btn-sm" onclick="importCronos()">Импортировать</button>
        <div class="status-msg" id="cronos-status"></div>
      </div>

      <div id="tab-batch" class="tab-content">
        <div style="font-size:.75rem;color:#64748b;margin-bottom:6px">
          Пути к файлам CSV/SQL/TXT — каждый с новой строки:
        </div>
        <textarea id="batch-paths" rows="5"
          style="width:100%;background:#0f1117;border:1px solid #2d3148;border-radius:6px;color:#e2e8f0;padding:6px 8px;font-size:.78rem;resize:vertical;margin-bottom:8px"
          placeholder="/Volumes/disk/file1.csv&#10;/Volumes/disk/file2.sql&#10;/Volumes/disk/file3.txt"></textarea>
        <input type="text" id="batch-dbname" placeholder="Название банка Cronos">
        <input type="text" id="batch-outdir" placeholder="Папка вывода (полный путь)">
        <button class="btn btn-primary btn-sm" onclick="convertBatch()">Конвертировать в один банк</button>
        <div class="status-msg" id="batch-status"></div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Поиск: ФИО, телефон, email, адрес..."
             onkeydown="if(event.key==='Enter') doSearch()">
      <select id="search-mode">
        <option value="simple">Простой поиск</option>
        <option value="cross">Перекрёстный + граф</option>
      </select>
      <button class="btn btn-primary" onclick="doSearch()">Найти</button>
    </div>

    <div class="content-area">
      <div class="results-pane" id="results-pane">
        <div class="empty-state">
          <div class="icon">🔍</div>
          <div>Введите запрос для поиска по всем базам</div>
          <div style="font-size:.8rem;margin-top:8px;color:#334155">
            Поддерживается: ФИО, email, телефон, ИНН, паспорт, адрес
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const selectedSources = new Set();

async function loadSources() {
  const r = await fetch('/api/sources');
  const sources = await r.json();
  document.getElementById('src-title').textContent = `Источники (${sources.length})`;
  const list = document.getElementById('source-list');
  if (!sources.length) {
    list.innerHTML = '<div style="color:#475569;font-size:.82rem">Нет загруженных баз</div>';
    return;
  }
  list.innerHTML = sources.map(s => `
    <div class="source-card" onclick="toggleSource(this,'${esc(s.name)}')" title="${esc(s.name)}">
      <input class="scheck" type="checkbox" onclick="event.stopPropagation();toggleSource(this.closest('.source-card'),'${esc(s.name)}')">
      <div class="sinfo">
        <div class="sname"><span class="badge badge-${s.type}">${s.type}</span>${esc(s.name)}</div>
        <div class="smeta">${s.record_count} записей · ${(s.imported_at||'').slice(0,10)}</div>
      </div>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded', loadSources);

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

function toggleSource(card, name) {
  const cb = card.querySelector('.scheck');
  if (selectedSources.has(name)) {
    selectedSources.delete(name);
    card.classList.remove('selected');
    if (cb) cb.checked = false;
  } else {
    selectedSources.add(name);
    card.classList.add('selected');
    if (cb) cb.checked = true;
  }
  const n = selectedSources.size;
  document.getElementById('sel-count').textContent = n + ' выбрано';
  const ef = document.getElementById('export-fields');
  if (n > 0) ef.classList.add('visible'); else ef.classList.remove('visible');
}

async function exportSelected() {
  const status  = document.getElementById('exp-status');
  const outdir  = document.getElementById('exp-outdir').value.trim();
  const dbname  = document.getElementById('exp-dbname').value.trim();
  if (!selectedSources.size) { status.textContent = 'Выберите источники'; return; }
  if (!outdir) { status.textContent = 'Укажите папку вывода'; return; }
  status.textContent = `Экспорт ${selectedSources.size} источников...`;
  const r = await fetch('/api/export/cronos/multi', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      source_names: [...selectedSources],
      output_dir: outdir,
      db_name: dbname || 'export'
    })
  });
  const j = await r.json();
  if (j.ok) {
    status.textContent = `✓ ${j.stats.tables} таблиц, ${j.stats.records} записей → ${outdir}`;
  } else {
    status.textContent = '✗ ' + (j.error || 'Ошибка');
  }
}

async function convertBatch() {
  const status  = document.getElementById('batch-status');
  const raw     = document.getElementById('batch-paths').value;
  const outdir  = document.getElementById('batch-outdir').value.trim();
  const dbname  = document.getElementById('batch-dbname').value.trim();
  const paths   = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (!paths.length) { status.textContent = 'Укажите пути к файлам'; return; }
  if (!outdir) { status.textContent = 'Укажите папку вывода'; return; }
  status.textContent = `Конвертируется ${paths.length} файлов...`;
  const r = await fetch('/api/convert/batch', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ paths, output_dir: outdir, db_name: dbname || 'export' })
  });
  const j = await r.json();
  if (j.ok) {
    const errs = j.stats.errors && j.stats.errors.length
      ? ` (${j.stats.errors.length} ошибок: ${j.stats.errors.join('; ')})`
      : '';
    status.textContent = `✓ ${j.stats.tables} таблиц, ${j.stats.records} записей → ${outdir}${errs}`;
  } else {
    status.textContent = '✗ ' + (j.error || 'Ошибка');
    if (j.details && j.details.length) {
      status.textContent += ' | ' + j.details.join('; ');
    }
  }
}

async function uploadFile(type) {
  const input = document.getElementById(type + '-file');
  const status = document.getElementById(type + '-status');
  if (!input.files.length) { status.textContent = 'Выберите файл'; return; }
  status.textContent = 'Загрузка...';
  const fd = new FormData();
  fd.append('file', input.files[0]);
  const r = await fetch('/api/import/' + type, { method: 'POST', body: fd });
  const j = await r.json();
  if (j.ok) {
    status.textContent = `✓ Импортировано ${j.stats.records} записей`;
    setTimeout(loadSources, 1000);
  } else {
    status.textContent = '✗ ' + (j.error || 'Ошибка');
  }
}

async function importCronos() {
  const path   = document.getElementById('cronos-path').value.trim();
  const name   = document.getElementById('cronos-name').value.trim();
  const status = document.getElementById('cronos-status');
  if (!path) { status.textContent = 'Укажите путь'; return; }
  status.textContent = 'Импорт...';
  const r = await fetch('/api/import/cronos', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ path, name: name || path })
  });
  const j = await r.json();
  if (j.ok) {
    status.textContent = `✓ ${j.stats.tables} таблиц, ${j.stats.records} записей`;
    setTimeout(loadSources, 1000);
  } else {
    status.textContent = '✗ ' + (j.error || 'Ошибка');
  }
}

async function doSearch() {
  const q    = document.getElementById('search-input').value.trim();
  const mode = document.getElementById('search-mode').value;
  if (!q) return;

  document.getElementById('results-pane').innerHTML =
    '<div class="empty-state"><div>Поиск...</div></div>';

  const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&mode=${mode}`);
  const j = await r.json();

  if (mode === 'cross') {
    renderResults(j.results, q);
    renderGraph(j.nodes, j.edges);
  } else {
    renderResults(j.results, q);
  }
}

function renderResults(results, query) {
  const pane = document.getElementById('results-pane');
  if (!results || !results.length) {
    pane.innerHTML = '<div class="empty-state"><div class="icon">😶</div><div>Ничего не найдено</div></div>';
    return;
  }
  const qLow = query.toLowerCase();
  let html = `<div class="results-count">${results.length} результатов</div>`;
  for (const rec of results) {
    html += `<div class="rec-card">
      <div class="rec-header">
        <span class="rec-source">${esc(rec.source_name)}</span>
        <span class="rec-table">${esc(rec.table_name)} #${rec.rec_id}</span>
      </div>
      <div class="rec-fields">`;
    for (const [k, v] of Object.entries(rec.data)) {
      if (!v || v === 'null') continue;
      const vs = String(v);
      const hi = vs.toLowerCase().includes(qLow) ? ' highlight' : '';
      html += `<span class="field"><span class="fkey">${esc(k)}:</span>
               <span class="fval${hi}">${esc(vs)}</span></span>`;
    }
    html += `</div></div>`;
  }
  pane.innerHTML = html;
}

function renderGraph(nodes, edges) {
  // graph removed — no vis-network dependency
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
