name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyinstaller flask crodump chardet pywebview

      - name: Build EXE
        shell: cmd
        run: |
          python -m PyInstaller ^
            --onedir ^
            --windowed ^
            --name "cronos_mac" ^
            --add-data "web;web" ^
            --add-data "core;core" ^
            --hidden-import flask ^
            --hidden-import flask.templating ^
            --hidden-import jinja2 ^
            --hidden-import jinja2.ext ^
            --hidden-import chardet ^
            --hidden-import crodump ^
            --hidden-import crodump.koddecoder ^
            --hidden-import werkzeug ^
            --hidden-import werkzeug.serving ^
            --hidden-import werkzeug.routing ^
            --hidden-import werkzeug.middleware ^
            --hidden-import werkzeug.middleware.shared_data ^
            --hidden-import click ^
            --hidden-import itsdangerous ^
            --hidden-import webview ^
            --hidden-import webview.platforms ^
            --hidden-import webview.platforms.winforms ^
            --collect-all crodump ^
            --collect-all webview ^
            launcher.py

      - name: Zip result
        shell: pwsh
        run: Compress-Archive -Path dist\cronos_mac\* -DestinationPath CronosMac-Windows.zip

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest CronosMac-Windows.zip \
            --title "CronosMac v16 — Windows" \
            --notes "Готовое приложение для Windows. Скачайте CronosMac-Windows.zip и запустите cronos_mac.exe"
