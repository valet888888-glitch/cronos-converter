name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller flask cronodump chardet pywebview

      - name: Build
        shell: cmd
        run: |
          python -m PyInstaller ^
            --onedir ^
            --windowed ^
            --name "cronos_mac" ^
            --add-data "web;web" ^
            --add-data "core;core" ^
            --hidden-import flask ^
            --hidden-import flask.templating ^
            --hidden-import jinja2 ^
            --hidden-import jinja2.ext ^
            --hidden-import chardet ^
            --hidden-import crodump ^
            --hidden-import crodump.crofile ^
            --hidden-import crodump.crodump ^
            --hidden-import crodump.crobankfile ^
            --hidden-import werkzeug ^
            --hidden-import werkzeug.serving ^
            --hidden-import werkzeug.routing ^
            --hidden-import werkzeug.middleware ^
            --hidden-import werkzeug.middleware.shared_data ^
            --hidden-import click ^
            --hidden-import itsdangerous ^
            --hidden-import webview ^
            --hidden-import webview.platforms ^
            --hidden-import webview.platforms.winforms ^
            --collect-all crodump ^
            --collect-all webview ^
            launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CronosMac-Windows
          path: dist/cronos_mac/
          retention-days: 30
